name: Release Cadence

on:
  schedule:
    # Thursday 10:07 UTC — odd minute to avoid the on-the-hour cron pile-up.
    - cron: '7 10 * * 4'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: release-cadence-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cadence:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Compute commits since last release/* tag
        id: changes
        run: |
          set -euo pipefail
          LAST_TAG=$(git describe --tags --match 'release/*' --abbrev=0 2>/dev/null || true)
          echo "last_tag=${LAST_TAG}"
          CAP=200
          if [[ -z "${LAST_TAG}" ]]; then
            RANGE_LABEL="(no previous release/* tag — listing recent packages/ history)"
            COMMITS_RAW=$(git log --oneline -- packages/)
          else
            RANGE_LABEL="${LAST_TAG}..HEAD"
            COMMITS_RAW=$(git log "${LAST_TAG}..HEAD" --oneline -- packages/)
          fi

          TOTAL_COUNT=$(printf '%s\n' "${COMMITS_RAW}" | grep -c . || true)
          if [[ "${TOTAL_COUNT}" -gt "${CAP}" ]]; then
            COMMITS_HEAD=$(printf '%s\n' "${COMMITS_RAW}" | head -n "${CAP}")
            TRUNC_NOTE="[…truncated: showing ${CAP} of ${TOTAL_COUNT} commits — run \`git log\` locally for the full list]"
            COMMITS="${COMMITS_HEAD}"$'\n'"${TRUNC_NOTE}"
          else
            COMMITS="${COMMITS_RAW}"
          fi

          if [[ -z "${COMMITS}" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "no packages/ commits since ${LAST_TAG:-origin}; skipping issue"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "last_tag=${LAST_TAG}" >> "$GITHUB_OUTPUT"
          echo "range_label=${RANGE_LABEL}" >> "$GITHUB_OUTPUT"

          # Randomize the heredoc delimiter so a commit subject equal to a
          # static sentinel (e.g. "EOF") cannot corrupt the multi-line output.
          DELIM="ghadelim_$(openssl rand -hex 8)"
          {
            echo "commits<<${DELIM}"
            echo "${COMMITS}"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Open release readiness issue
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RANGE_LABEL: ${{ steps.changes.outputs.range_label }}
          COMMITS: ${{ steps.changes.outputs.commits }}
        run: |
          set -euo pipefail
          TITLE="release readiness: $(date -u +%Y-%m-%d)"
          BODY_FILE="${RUNNER_TEMP}/cadence-body.md"
          # Build the issue body via line-by-line writes so YAML indentation
          # (required by `run: |`) does not bleed into the markdown — a heredoc
          # indented inside `run:` would render the entire body as a code block,
          # hiding headings and lists.
          {
            echo '### packages/ commits since last release tag'
            echo
            echo "Range: ${RANGE_LABEL}"
            echo
            echo '```'
            echo "${COMMITS}"
            echo '```'
            echo
            echo '### Maintainer next steps'
            echo
            echo '- Decide which packages need a same-minor patch hotfix → trigger `Release Packages` with `mode=publish-single`, `only=<comma-separated>`. (publish-single is patch-only by contract.)'
            echo '- If this batch crosses a minor (new public surface, breaking config, ecosystem coordination) → bump `VERSION`, then trigger `mode=publish-all` with the new `version` input.'
            echo '- If nothing needs to ship this week, close this issue with a brief note ("nothing to ship — only tooling/docs commits").'
            echo
            echo '_Auto-generated by `release-cadence.yml`._'
          } > "${BODY_FILE}"
          gh issue create \
            --title "${TITLE}" \
            --body-file "${BODY_FILE}" \
            --label "release-cadence"
